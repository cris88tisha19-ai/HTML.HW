<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favourite Cartoon Character</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .character-card {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: auto;
            text-align: center;
        }
        h1 {
            color: #ff6b6b;
            font-family: 'Comic Sans MS', cursive;
        }
    </style>
</head>
<body>
    <div class="character-card">
        <h1>SpongeBob SquarePants</h1>
        <img src="https://placeholder.com" alt="SpongeBob" style="border: 5px solid #ffd93d; border-radius: 15px;">
        <p style="font-size: 1.2rem; color: #444; margin-top: 20px;">
            Who lives in a pineapple under the sea?
        </p>
        <div class="stats">
            <p><strong>Home:</strong> Bikini Bottom</p>
            <p><strong>Job:</strong> Fry Cook</p>
        </div>
        <button class="btn">Learn More</button>
    </div>
</body>
</html>
