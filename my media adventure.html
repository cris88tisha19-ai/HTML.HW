<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Multimedia Project</title>
</head>
<body>

    <h1>HTML Media Showcase</h1>

    <!-- 1. Images with Descriptive Alt Tags -->
    <section>
        <h2>Gallery</h2>
        <img src="mountain.jpg" alt="A snow-capped mountain peak during sunrise" width="300">
        <img src="forest.jpg" alt="Dense green forest with sunlight filtering through trees" width="300">
        <img src="ocean.jpg" alt="Calm blue ocean waves crashing on a sandy beach" width="300">
    </section>

    <!-- 2. Audio with Controls and Loop -->
    <section>
        <h2>Music Player</h2>
        <audio controls loop>
            <source src="background-music.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </section>

    <!-- 3. Video with Controls, Loop, and Poster -->
    <section>
        <h2>Video Player</h2>
        <video width="600" controls loop poster="video-thumbnail.jpg">
            <source src="nature-clip.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </section>

</body>
</html>
